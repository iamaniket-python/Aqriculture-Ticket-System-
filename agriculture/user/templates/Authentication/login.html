{% extends 'Base/base.html' %}

{% block content %}

<style>
body {
    background: #f9fafb;
    font-family: 'Segoe UI', sans-serif;
}

/* Center layout */
.login-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.card-ui {
    width: 380px;
    padding: 35px;
    border-radius: 16px;

    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    text-align: center;
}

/* Title */
.card-ui h3 {
    font-weight: 700;
    margin-bottom: 20px;
    color: #111827;
}

/* Input */
.card-ui input {
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    padding: 10px;
}

/* Button */
.primary-btn {
    background: #111827;
    color: white;
    border-radius: 10px;
    padding: 10px;
    border: none;
    font-weight: 600;
    transition: 0.3s;
}

.primary-btn:hover {
    background: #374151;
}

/* Signup link */
.link-text {
    margin-top: 15px;
    font-size: 14px;
}

.link-text a {
    color: #111827;
    font-weight: 600;
}
</style>

<div class="login-wrapper">
    <div class="card-ui">

        <h3>Login</h3>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <input class="form-control mb-3"
                   name="mobile"
                   placeholder="Enter Mobile Number"
                   required>

            <button type="submit" class="primary-btn w-100">
                Send OTP
            </button>
        </form>

        {% if error %}
        <p class="text-danger mt-3">{{ error }}</p>
        {% endif %}

        <div class="link-text">
            New user? <a href="{% url 'register' %}">Create Account</a>
        </div>

    </div>
</div>

{% endblock %}

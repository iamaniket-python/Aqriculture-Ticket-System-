{% extends 'Base/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<style>
body {
    background: #f9fafb;
    font-family: 'Segoe UI', sans-serif;
}

/* Center layout */
.signup-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.signup-card {
    width: 420px;
    padding: 35px;
    border-radius: 16px;

    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    text-align: center;
}

/* Title */
.signup-card h3 {
    font-weight: 700;
    margin-bottom: 20px;
    color: #111827;
}

/* Inputs */
.signup-card input {
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    padding: 10px;
    transition: 0.3s;
}

.signup-card input:focus {
    border-color: #111827;
    box-shadow: 0 0 0 2px rgba(17,24,39,0.1);
}

/* Button */
.btn-custom {
    background: #111827;
    color: white;
    font-weight: 600;
    border-radius: 10px;
    padding: 10px;
    border: none;
    transition: 0.3s;
}

.btn-custom:hover {
    background: #374151;
}

/* Login link */
.login-link {
    margin-top: 15px;
    font-size: 14px;
}

.login-link a {
    color: #111827;
    font-weight: 600;
    text-decoration: none;
}
</style>

<div class="signup-wrapper">
    <div class="signup-card">

        <h3>📝 Create Account</h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3"
                   name="username"
                   placeholder="Username"
                   required>

            <input class="form-control mb-3"
                   name="email"
                   placeholder="Email"
                   required>

            <input class="form-control mb-3"
                   name="mobile"
                   placeholder="Mobile Number"
                   required>

            <input class="form-control mb-3"
                   type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button class="btn-custom w-100">
                Register
            </button>
        </form>

        {% if error %}
        <p class="text-danger mt-2">{{ error }}</p>
        {% endif %}

        <div class="login-link">
            Already have account?
            <a href="{% url 'login' %}">Login</a>
        </div>

    </div>
</div>

{% endblock %}

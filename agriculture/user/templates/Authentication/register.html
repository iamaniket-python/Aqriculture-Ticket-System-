{% extends 'Base/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #43cea2, #185a9d);
    min-height: 100vh;
}

/* Glass effect */
.glass-card {
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.15);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
}

/* Inputs */
.glass-input {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
}

.glass-input::placeholder {
    color: #ddd;
}

/* Button */
.btn-custom {
    background: #ffffff;
    color: #333;
    font-weight: bold;
}
.btn-custom:hover {
    background: #f1f1f1;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="height:90vh;">
    <div class="glass-card p-5" style="width: 400px;">

        <h3 class="text-center mb-4">📝 Create Account</h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control glass-input mb-3" name="username" placeholder="Username">

            <input class="form-control glass-input mb-3" name="email" placeholder="Email">

            <!-- ✅ NEW MOBILE FIELD -->
            <input class="form-control glass-input mb-3" name="mobile" placeholder="Mobile Number">

            <input class="form-control glass-input mb-3" type="password" name="password" placeholder="Password">

            <button class="btn btn-custom w-100">Register</button>
        </form>

        {% if error %}
        <p class="text-warning mt-2 text-center">{{ error }}</p>
        {% endif %}

        <p class="mt-4 text-center">
            <a href="{% url 'login' %}" class="text-white">Already have account? Login</a>
        </p>

    </div>
</div>

{% endblock %}

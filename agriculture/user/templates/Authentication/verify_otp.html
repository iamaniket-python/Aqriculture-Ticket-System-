{% extends 'Base/base.html' %}

{% block content %}

<style>
body {
    background: #f9fafb;
    font-family: 'Segoe UI', sans-serif;
}

/* Center wrapper */
.otp-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.otp-card {
    width: 420px;
    padding: 35px;
    border-radius: 16px;

    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    text-align: center;
}

/* Title */
.otp-card h3 {
    font-weight: 700;
    margin-bottom: 10px;
    color: #111827;
}

.otp-card p {
    color: #6b7280;
    font-size: 14px;
}

/* OTP boxes */
.otp-boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
}

.otp-boxes input {
    width: 55px;
    height: 60px;
    text-align: center;
    font-size: 22px;
    border-radius: 10px;

    border: 1px solid #e5e7eb;
    outline: none;

    background: #f3f4f6;
    color: #111827;
    font-weight: bold;
    transition: 0.2s;
}

.otp-boxes input:focus {
    border-color: #111827;
    box-shadow: 0 0 0 2px rgba(17,24,39,0.1);
}

/* Button */
.verify-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;

    background: #111827;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.verify-btn:hover {
    background: #374151;
}

/* Error */
.error {
    color: red;
    margin-top: 10px;
}

/* Resend */
.resend {
    margin-top: 15px;
    font-size: 14px;
    color: #6b7280;
}

.resend a {
    color: #111827;
    font-weight: 600;
    text-decoration: none;
}

.disabled {
    pointer-events: none;
    opacity: 0.4;
}
</style>

<div class="otp-wrapper">
    <div class="otp-card">

        <h3>🔐 Verify OTP</h3>
        <p>Enter the 4-digit code sent to your mobile</p>

        <form method="POST">
            {% csrf_token %}

            <div class="otp-boxes">
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
            </div>

            <!-- hidden real input -->
            <input type="hidden" name="otp" id="otpValue">

            <button type="submit" class="verify-btn">
                Verify OTP
            </button>
        </form>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <div class="resend">
            Resend OTP in <span id="timer">60</span>s <br>
            <a href="{% url 'resend_otp' %}" id="resendBtn" class="disabled">
                Resend OTP
            </a>
        </div>

    </div>
</div>

<script>
let inputs = document.querySelectorAll(".otp-input");
let hiddenInput = document.getElementById("otpValue");

// auto move + combine OTP
inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        let otp = "";
        inputs.forEach(i => otp += i.value);
        hiddenInput.value = otp;
    });
});

// backspace support
inputs.forEach((input, index) => {
    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// timer
let timeLeft = 60;
let timer = document.getElementById("timer");
let resendBtn = document.getElementById("resendBtn");

let countdown = setInterval(() => {
    timeLeft--;
    timer.innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(countdown);
        timer.innerText = "0";
        resendBtn.classList.remove("disabled");
    }
}, 1000);
</script>

{% endblock %}

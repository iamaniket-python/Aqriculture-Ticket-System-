{% extends 'Base/base.html' %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    height: 100vh;
}

/* Center wrapper */
.otp-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Glass card */
.otp-card {
    width: 420px;
    padding: 30px;
    border-radius: 18px;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);

    color: white;
    text-align: center;
}

/* OTP boxes */
.otp-boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
}

.otp-boxes input {
    width: 50px;
    height: 55px;
    text-align: center;
    font-size: 22px;
    border-radius: 10px;

    border: none;
    outline: none;

    background: rgba(255, 255, 255, 0.25);
    color: white;
    font-weight: bold;
}

/* Button */
.verify-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;

    background: white;
    color: #7c3aed;
    font-weight: 600;
    transition: 0.3s;
}

.verify-btn:hover {
    background: #e5e7eb;
}

/* Resend */
.resend {
    margin-top: 15px;
    font-size: 14px;
}

.resend a {
    color: #fff;
    text-decoration: underline;
}

.disabled {
    pointer-events: none;
    opacity: 0.5;
}
</style>

<div class="otp-wrapper">
    <div class="otp-card">

        <h3>🔐 Verify OTP</h3>
        <p>Enter the 4-digit code sent to your mobile</p>

        <form method="POST">
            {% csrf_token %}

            <div class="otp-boxes">
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
            </div>

            <!-- hidden real input -->
            <input type="hidden" name="otp" id="otpValue">

            <button type="submit" class="verify-btn">Verify OTP</button>
        </form>

        {% if error %}
        <p style="color:red; margin-top:10px;">{{ error }}</p>
        {% endif %}

        <div class="resend">
            Resend OTP in <span id="timer">60</span>s <br>
            <a href="{% url 'resend_otp' %}" id="resendBtn" class="disabled">Resend OTP</a>
        </div>

    </div>
</div>

<script>
let inputs = document.querySelectorAll(".otp-input");
let hiddenInput = document.getElementById("otpValue");

// auto focus next box
inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        let otp = "";
        inputs.forEach(i => otp += i.value);
        hiddenInput.value = otp;
    });
});

// timer
let timeLeft = 60;
let timer = document.getElementById("timer");
let resendBtn = document.getElementById("resendBtn");

let countdown = setInterval(() => {
    timeLeft--;
    timer.innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(countdown);
        timer.innerText = "0";
        resendBtn.classList.remove("disabled");
    }
}, 1000);
</script>

{% endblock %}

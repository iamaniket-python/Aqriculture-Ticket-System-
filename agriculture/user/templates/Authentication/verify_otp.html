{% extends 'Base/base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="card p-4 shadow text-center">

        <h3>🔐 Enter OTP</h3>
        <p>OTP sent to your mobile</p>

        <form method="POST">
            {% csrf_token %}
            <input class="form-control mb-3 text-center" name="otp" placeholder="Enter OTP">
            <button class="btn btn-success w-100">Verify</button>
        </form>

        {% if error %}
        <p class="text-danger mt-2">{{ error }}</p>
        {% endif %}

        <!-- ⏱️ TIMER -->
        <p class="mt-3">
            Resend OTP in <span id="timer">60</span> sec
        </p>

        <!-- 🔁 RESEND BUTTON -->
        <a href="{% url 'resend_otp' %}" id="resendBtn" class="btn btn-link disabled">Resend OTP</a>

    </div>
</div>

<script>
    let timeLeft = 60;
    let timer = document.getElementById("timer");
    let resendBtn = document.getElementById("resendBtn");

    let countdown = setInterval(function () {
        timeLeft--;
        timer.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timer.innerText = "0";
            resendBtn.classList.remove("disabled");  
        }
    }, 1000);
</script>

{% endblock %}

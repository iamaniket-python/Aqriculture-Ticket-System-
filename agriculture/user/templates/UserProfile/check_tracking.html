{% extends 'Base/base.html' %}

{% block title %}Verify Tracking{% endblock %}

{% block content %}

<style>
body {
    background: #f9fafb;
    font-family: 'Segoe UI', sans-serif;
}

/* Center layout */
.tracking-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.tracking-card {
    width: 400px;
    padding: 35px;
    border-radius: 16px;

    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    text-align: center;
}

/* Title */
.tracking-card h2 {
    font-weight: 700;
    color: #111827;
    margin-bottom: 10px;
}

.tracking-card p {
    color: #6b7280;
    font-size: 14px;
}

/* Input */
.tracking-card input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;

    border: 1px solid #e5e7eb;
    border-radius: 10px;

    background: #f3f4f6;
    color: #111827;
    text-align: center;
    font-size: 15px;

    transition: 0.2s;
}

.tracking-card input:focus {
    border-color: #111827;
    box-shadow: 0 0 0 2px rgba(17,24,39,0.1);
    outline: none;
}

/* Button */
.tracking-card button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;

    border: none;
    border-radius: 10px;

    background: #111827;
    color: white;
    font-weight: 600;

    cursor: pointer;
    transition: 0.3s;
}

.tracking-card button:hover {
    background: #374151;
}

/* Error */
.error {
    margin-top: 10px;
    color: #ef4444;
    font-size: 14px;
}
</style>

<div class="tracking-wrapper">

    <div class="tracking-card">

        <h2>🔐 Verify Tracking ID</h2>
        <p>Enter your tracking ID to continue</p>

        <form method="POST">
            {% csrf_token %}

            <input name="tracking_id"
                   placeholder="Enter Tracking ID"
                   required>

            <button type="submit">
                Verify
            </button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</div>

{% endblock %}

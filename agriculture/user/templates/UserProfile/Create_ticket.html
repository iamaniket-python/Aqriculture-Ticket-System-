{% extends 'Base/base.html' %}

{% block title %}Create Ticket{% endblock %}

{% block content %}
{% load static %}

<div class="ticket-wrapper">

    <div class="ticket-card">

        <h2>🎫 Create Ticket</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input name="title" placeholder="Enter Title" required>

            <textarea name="description" placeholder="Describe your issue" required></textarea>

            
            <label>Purchase</label>
            <select name="purchase" required>
                <option value="">Select Purchase</option>
                <option value="laptop">Laptop</option>
                <option value="mobile">Mobile</option>
                <option value="iphone">i phone</option>
            </select>

            
            <label>category</label>
            <select name="category" required>
                <option value="">Select Priority</option>
                <option value="tv">tv</option>
                <option value="fridge">fridge</option>
                <option value="skincare">skincare</option>
            </select>

            <label>📷 Upload Images</label>
            <input type="file" name="images" multiple>

            <label>📄 Upload Document</label>
            <input type="file" name="document">

            <button type="submit">Submit Ticket</button>

        </form>

    </div>

</div>

{% endblock %}
